name: Publish package
on:
  release:
    types: [published]
permissions:
  id-token: write # Required for OIDC
  contents: read
jobs:
  publish:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish
